{% extends "base.html" %}

{% block title %}Nova Rota | Comunicação Interna{% endblock %}

{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow">Frota</p>
    <h1 class="page-title">Nova rota</h1>
    <p class="page-subtitle">Cadastre uma viagem com origem, destino, motorista, caminhão e carga.</p>
  </div>
</section>

<section class="surface p-3 p-lg-4">
  <form method="post" class="row g-4">
    <div class="col-md-6">
      <label for="motorista" class="form-label fw-semibold">Motorista</label>
      <input id="motorista" class="form-control" type="text" name="motorista" required value="{{ dados_form.get('motorista', '') }}" placeholder="Nome do motorista">
    </div>

    <div class="col-md-6">
      <label for="caminhao" class="form-label fw-semibold">Caminhão</label>
      <input id="caminhao" class="form-control" type="text" name="caminhao" required value="{{ dados_form.get('caminhao', '') }}" placeholder="Placa ou identificação">
    </div>

    <div class="col-md-6">
      <label for="origem" class="form-label fw-semibold">Origem</label>
      <input id="origem" class="form-control" type="text" name="origem" required value="{{ dados_form.get('origem', '') }}" placeholder="Cidade/UF de saída">
    </div>

    <div class="col-md-6">
      <label for="destino" class="form-label fw-semibold">Destino</label>
      <input id="destino" class="form-control" type="text" name="destino" required value="{{ dados_form.get('destino', '') }}" placeholder="Cidade/UF de chegada">
    </div>

    <div class="col-md-8">
      <label for="carga" class="form-label fw-semibold">Carga</label>
      <input id="carga" class="form-control" type="text" name="carga" required value="{{ dados_form.get('carga', '') }}" placeholder="Descrição da carga">
    </div>

    <div class="col-md-4">
      <label for="data_saida" class="form-label fw-semibold">Data de saída</label>
      <input id="data_saida" class="form-control" type="date" name="data_saida" required value="{{ dados_form.get('data_saida', '') }}">
    </div>

    <div class="col-12 d-flex gap-2 flex-wrap">
      <button class="btn btn-primary btn-lg" type="submit">
        <i class="bi bi-check2-circle"></i>
        Salvar rota
      </button>
      <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('listar_rotas') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
