{% extends "base.html" %}

{% block title %}Nova Publicação | Comunicação Interna{% endblock %}

{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow">Novo comunicado</p>
    <h1 class="page-title">Criar publicação</h1>
    <p class="page-subtitle">Escreva um aviso, notícia ou evento para os departamentos certos.</p>
  </div>
</section>

<section class="surface p-3 p-lg-4">
  <form method="post" class="row g-4">
    <div class="col-12">
      <label for="titulo" class="form-label fw-semibold">Título</label>
      <input id="titulo" class="form-control form-control-lg" type="text" name="titulo" minlength="5" required value="{{ dados_form.get('titulo', '') }}" placeholder="Ex: Reunião geral de segunda-feira">
    </div>

    <div class="col-12">
      <label for="conteudo" class="form-label fw-semibold">Conteúdo</label>
      <textarea id="conteudo" class="form-control" name="conteudo" rows="7" minlength="10" required placeholder="Digite os detalhes da publicação...">{{ dados_form.get('conteudo', '') }}</textarea>
    </div>

    <div class="col-md-6">
      <label for="tipo" class="form-label fw-semibold">Tipo</label>
      <select id="tipo" class="form-select" name="tipo" required>
        <option value="">Selecione</option>
        <option value="aviso" {% if dados_form.get('tipo') == 'aviso' %}selected{% endif %}>Aviso</option>
        <option value="noticia" {% if dados_form.get('tipo') == 'noticia' %}selected{% endif %}>Notícia</option>
        <option value="evento" {% if dados_form.get('tipo') == 'evento' %}selected{% endif %}>Evento</option>
      </select>
    </div>

    <div class="col-md-6">
      <label for="departamentos" class="form-label fw-semibold">Departamentos</label>
      <input id="departamentos" class="form-control" type="text" name="departamentos" required value="{{ dados_form.get('departamentos', '') }}" placeholder="RH, Operação, Financeiro">
      <div class="form-text">Separe os departamentos por vírgula.</div>
    </div>

    <div class="col-12 d-flex gap-2 flex-wrap">
      <button class="btn btn-primary btn-lg" type="submit">
        <i class="bi bi-check2-circle"></i>
        Salvar publicação
      </button>
      <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('listar_publicacoes') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
